apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-hello
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:denyryn/assignment-integrative_programming.git
    targetRevision: main
    path: chap-2-helloworld
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
